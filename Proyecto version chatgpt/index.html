<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MyTube</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
display:flex;
align-items:center;
padding:10px 20px;
background:#181818;
}

.logo{
font-size:22px;
font-weight:bold;
color:red;
}

.search{
margin-left:20px;
flex:1;
}

.search input{
width:60%;
padding:10px;
background:#121212;
border:1px solid #333;
color:white;
}

.menu{
margin-left:auto;
}

.menu a{
color:white;
margin-left:15px;
text-decoration:none;
}

.videos{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.video{
background:#181818;
padding:10px;
border-radius:10px;
}

.video img{
width:100%;
border-radius:8px;
}

</style>
</head>

<body>

<header>

<div class="logo">MyTube</div>

<div class="search">
<input type="text" placeholder="Buscar">
</div>

<div class="menu">
<a href="login.html">Login</a>
<a href="register.html">Registro</a>
</div>

</header>

<div class="videos">

<div class="video">
<img src="https://img.youtube.com/vi/dQw4w9WgXcQ/hqdefault.jpg">
<h4>Video de ejemplo</h4>
<p>Canal demo</p>
</div>

<div class="video">
<img src="https://img.youtube.com/vi/9bZkp7q19f0/hqdefault.jpg">
<h4>Otro video</h4>
<p>Canal demo</p>
</div>

</div>

</body>
</html>
