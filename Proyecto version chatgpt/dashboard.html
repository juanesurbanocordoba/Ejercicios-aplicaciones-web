<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
display:flex;
align-items:center;
padding:10px 20px;
background:#181818;
}

.logo{
font-size:22px;
font-weight:bold;
color:red;
}

.search{
margin-left:20px;
flex:1;
}

.search input{
width:60%;
padding:10px;
background:#121212;
border:1px solid #333;
color:white;
}

.logout{
margin-left:auto;
}

.logout a{
color:white;
text-decoration:none;
}

.container{
display:flex;
}

.sidebar{
width:200px;
background:#181818;
height:100vh;
padding:20px;
}

.sidebar a{
display:block;
color:white;
padding:10px 0;
text-decoration:none;
}

.videos{
flex:1;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.video{
background:#181818;
padding:10px;
border-radius:10px;
}

.video img{
width:100%;
border-radius:8px;
}

</style>
</head>

<body>

<header>

<div class="logo">MyTube</div>

<div class="search">
<input type="text" placeholder="Buscar">
</div>

<div class="logout">
<a href="index.html">Salir</a>
</div>

</header>

<div class="container">

<div class="sidebar">

<a href="#">Inicio</a>
<a href="#">Tendencias</a>
<a href="#">Suscripciones</a>
<a href="#">Biblioteca</a>

</div>

<div class="videos">

<div class="video">
<img src="https://img.youtube.com/vi/dQw4w9WgXcQ/hqdefault.jpg">
<h4>Video ejemplo</h4>
<p>Canal demo</p>
</div>

<div class="video">
<img src="https://img.youtube.com/vi/9bZkp7q19f0/hqdefault.jpg">
<h4>Video ejemplo 2</h4>
<p>Canal demo</p>
</div>

</div>

</div>

</body>
</html>
